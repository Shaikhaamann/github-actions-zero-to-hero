name: portfolio

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    pages: write
    id-token: write
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
              

        steps:
            #get access to your portfolio code via pre-build action
            #step 1
            - name: Checkout Code
              uses: actions/checkout@v4

            # setup GitHub pages
            #step 2
            - name: setup GitHub pages
              uses: actions/configure-pages@v4

            #static code ARTIFACTS
            #step 3
            - name: Upload static files
              uses: actions/upload-pages-artifact@v4
              with:
                path: "."
              
              #make page live
              #step 4
            - name: Deploy to GitHub pages
              uses: actions/deploy-pages@v4
