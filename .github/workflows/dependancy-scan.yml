#packages - issues ya vulnerabilites (scan)
#pip-audit

name: Dependency Scan 

on: 
    workflow_call:

jobs:
    dependancy-check:
        runs-on: ubuntu-latest
        steps:
            - name: code Checkout
              uses: actions/checkout@v4

            - name: setup python 3.12
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            
            - name: Install pip audit
              run: pip install pip-audit

            - name: Audit Dependancy
              run: pip-audit -r requirments.txt
